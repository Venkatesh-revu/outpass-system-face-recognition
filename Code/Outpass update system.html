<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGUKT Outpass System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e3f2fd, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
    width: 100%;
    max-width: 420px;  /* 👈 important */
}

.logo {
    width: 60px;
    max-width: 20%;
}

video, canvas {
    width: 100%;      /* 👈 responsive */
    height: auto;     /* 👈 keep ratio */
    border-radius: 10px;
    border: 2px solid #ccc;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #1976d2;
    color: white;
    cursor: pointer;
    font-size: 14px;
    width: 48%;
}

button:hover {
    background: #0d47a1;
}

.action-buttons {
    display: flex;
    justify-content: space-between;
}

</style>
</head>

<body>

<div class="container">

    <!-- Add your RGUKT logo file -->
    <img src="rgukt-logo.png" class="logo" alt="RGUKT Logo">

    <h2>Outpass System</h2>
    <p>Face Recognition Entry/Exit</p>

    <video id="video" width="350" height="250" autoplay></video>

    <br>

    <input type="text" id="name" placeholder="Enter Student Name">

    <div>
        <button onclick="startCamera()">Start Camera</button>
        <button onclick="captureImage()">Capture</button>
    </div>

    <script>
    context.drawImage(video, 0, 0, 350, 250);
</script>

    <div class="action-buttons">
        <button onclick="markEntry()">Mark Entry</button>
        <button onclick="markExit()">Mark Exit</button>
    </div>

</div>

<script>
    let video = document.getElementById("video");
    let canvas = document.getElementById("canvas");
    let context = canvas.getContext("2d");

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(() => {
                alert("Camera access denied!");
            });
    }

    function captureImage() {
        context.drawImage(video, 0, 0, 350, 250);
    }

    function markEntry() {
        let name = document.getElementById("name").value;
        alert(name + " marked as ENTRY");
    }

    function markExit() {
        let name = document.getElementById("name").value;
        alert(name + " marked as EXIT");
    }
</script>

</body>
</html>
